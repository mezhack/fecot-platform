services:
  db:
    image: postgres:16-alpine
    container_name: fecot-db
    environment:
      POSTGRES_USER: fecot
      POSTGRES_PASSWORD: fecot
      POSTGRES_DB: fecot_dev
    ports:
      - "5432:5432"
    volumes:
      - fecot_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fecot -d fecot_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: fecot-backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg2://fecot:fecot@db:5432/fecot_dev
      APP_ENV: development
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      UPLOAD_DIR: /app/uploads
      UPLOAD_PUBLIC_PREFIX: /uploads
    ports:
      - "3002:3002"
    depends_on:
      db:
        condition: service_healthy
    command: ["sh", "-c", "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 3002 --reload"]
    volumes:
      - ./backend:/app
      - fecot_uploads:/app/uploads

  frontend:
    image: node:20-alpine
    container_name: fecot-frontend
    working_dir: /app
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3002
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    command: ["sh", "-c", "npm install && npm run dev"]
    depends_on:
      - backend

volumes:
  fecot_pgdata:
  fecot_uploads:
